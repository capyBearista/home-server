# Docker Compose file for running Paperless-ngx.
# Uses PostgreSQL, Redis, Apache Tika, and Gotenberg for full document processing support.
#
# To install:
#   1. Copy this file as 'docker-compose.yml'
#   2. Create a 'docker-compose.env' file with your settings
#   3. Run 'docker compose pull' then 'docker compose up -d'
#
# For more info, refer to: https://docs.paperless-ngx.com

services:
  broker:
    image: docker.io/library/redis:8
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - default
      - docker_network

  db:
    image: docker.io/library/postgres:18
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: your-db-password
    networks:
      - default
      - docker_network

  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      - db
      - broker
      - gotenberg
      - tika
    ports:
      - "8010:8000"
    volumes:
      - data:/usr/src/paperless/data
      - /path/to/your/paperless/media:/usr/src/paperless/media
      - ./export:/usr/src/paperless/export
      - ./consume:/usr/src/paperless/consume
    env_file: docker-compose.env
    environment:
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_DBHOST: db
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
    networks:
      - default
      - docker_network

  gotenberg:
    image: docker.io/gotenberg/gotenberg:8.25
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"
    networks:
      - default
      - docker_network

  tika:
    image: docker.io/apache/tika:latest
    restart: unless-stopped
    networks:
      - default
      - docker_network

volumes:
  data:
  pgdata:
  redisdata:

networks:
  docker_network:
    external: true
