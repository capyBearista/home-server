# CrowdSec Bouncer Configuration for NPMplus
# Place this file at: <npmplus-data-dir>/crowdsec/crowdsec.conf
#
# This configures the NPMplus Lua bouncer to communicate with CrowdSec's
# Local API (LAPI) running on the Docker host.

ENABLED=true
API_URL=http://172.17.0.1:8080
# Generate an API key with: sudo cscli bouncers add npmplus-bouncer
API_KEY=your-crowdsec-api-key
USE_TLS_AUTH=false
TLS_CLIENT_CERT=/path/to/client.crt
TLS_CLIENT_KEY=/path/to/client.key
CACHE_EXPIRATION=1

# Bounce for all types of remediation (ban, captcha, etc.)
BOUNCING_ON_TYPE=all
FALLBACK_REMEDIATION=ban
REQUEST_TIMEOUT=3000
UPDATE_FREQUENCY=10

# By default internal requests are ignored (e.g., paths from rewrite rules)
ENABLE_INTERNAL=false

# live or stream mode
MODE=live

# Exclude certain paths from bouncing
EXCLUDE_LOCATION=/login,/api,/favicon.ico

# Ban action settings
BAN_TEMPLATE_PATH=/data/crowdsec/ban.html
REDIRECT_LOCATION=
RET_CODE=

# Captcha action settings (optional)
# Valid providers: recaptcha, hcaptcha, turnstile
CAPTCHA_PROVIDER=
SECRET_KEY=
SITE_KEY=
CAPTCHA_TEMPLATE_PATH=/data/crowdsec/captcha.html
CAPTCHA_EXPIRATION=3600

# AppSec settings (optional — CrowdSec Application Security)
APPSEC_URL=http://172.17.0.1:7422
APPSEC_FAILURE_ACTION=deny
APPSEC_CONNECT_TIMEOUT=
APPSEC_SEND_TIMEOUT=1000
APPSEC_PROCESS_TIMEOUT=30000
ALWAYS_SEND_TO_APPSEC=false
SSL_VERIFY=true
